// ============================================
// docker-compose.yml - MongoDB Container
// ============================================
version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: healthvue-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: healthvue

  backend:
    build: .
    container_name: healthvue-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/healthvue?authSource=admin
      JWT_SECRET: healthvue_super_secret_key_2024
      PORT: 5000
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongodb_data: